<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Videokê Rio - Catálogo Online
    </title>

    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#001842">

    <link
    rel="icon"
    href="assets/logo.png">

    <link
    rel="stylesheet"
    href="style.css">

</head>

<body>
    <header>
        
        <img
        src="assets/logo.png"
        class="logo"
        alt="Videokê Rio">
        <!-- BUSCA -->
        <div class="busca-container">
            <div class="busca-box">
                <span class="icone-busca">
                    🔍
                </span>
                <input
                type="text"
                id="busca"
                placeholder="Buscar música, cantor ou código">
            </div>
        </div>
        <!-- CATEGORIAS -->
        <div class="categorias">

           <button
id="btnTodas"
class="categoria ativa"
onclick="mostrarTodas()">
📋 TODAS
</button>

<button
id="btnNacionais"
class="categoria"
onclick="mostrarNacionais()">
🎤 NACIONAIS
</button>

<button
id="btnInternacionais"
class="categoria"
onclick="mostrarInternacionais()">
🌎 INTERNACIONAIS
</button>

<button
id="btnGospel"
class="categoria"
onclick="mostrarGospel()">
🙏 GOSPEL
</button>

<button
id="btnInfantil"
class="categoria"
onclick="mostrarInfantil()">
👶 INFANTIL
</button>

<button
id="btnFavoritos"
class="categoria"
onclick="mostrarFavoritos()">
❤️ FAVORITOS

</button>

        </div>

        <!-- CONTADORES -->

        <div id="contador"></div>

        <div id="resultadosEncontrados"></div>

        <div class="subtitulo">

            Encontre sua música pelo código,
            nome ou cantor

        </div>

    </header>

    <!-- ==========================
         RESULTADOS
    =========================== -->

    <main>

        <div id="resultado"></div>

    </main>

    <!-- ==========================
         PAGINAÇÃO
    =========================== -->

    <div class="paginacao">

        <button
        onclick="paginaAnterior()">

            ◀

        </button>

        <div id="paginaAtual">

            1 de 1

        </div>

        <button
        onclick="proximaPagina()">

            ▶

        </button>

    </div>

    <!-- ==========================
         JAVASCRIPT
    =========================== -->

    <script src="script.js"></script>


    <script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register(
            "service-worker.js"
        );

    });

}

</script>

</body>

</html>
